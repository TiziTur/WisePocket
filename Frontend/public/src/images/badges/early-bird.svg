<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <circle cx="40" cy="40" r="38" fill="#ffedd5" stroke="#f97316" stroke-width="2.5"/>
  <!-- sun rising behind horizon -->
  <rect x="14" y="48" width="52" height="16" rx="5" fill="#06b6d4" opacity=".2"/>
  <!-- sun rays -->
  <line x1="40" y1="14" x2="40" y2="20" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="58" y1="20" x2="54" y2="24" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="20" x2="26" y2="24" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="38" x2="58" y2="38" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="38" x2="22" y2="38" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <!-- sun half circle on horizon -->
  <path d="M20 48 A20 20 0 0 1 60 48Z" fill="#f97316"/>
  <!-- horizon line -->
  <line x1="14" y1="48" x2="66" y2="48" stroke="#f97316" stroke-width="2" stroke-linecap="round" opacity=".6"/>
  <!-- clock showing 6am -->
  <circle cx="40" cy="62" r="9" fill="white" stroke="#f97316" stroke-width="1.8"/>
  <line x1="40" y1="62" x2="40" y2="55" stroke="#f97316" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="40" y1="62" x2="44" y2="62" stroke="#f97316" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="40" cy="62" r="1.3" fill="#f97316"/>
</svg>
